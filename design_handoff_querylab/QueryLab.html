<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>QueryLab — Landing & Analyzer</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: oklch(0.992 0 0);
    --fg: oklch(0.145 0 0);
    --card: oklch(1 0 0);
    --muted: oklch(0.968 0 0);
    --muted-fg: oklch(0.52 0 0);
    --border: oklch(0.918 0 0);
    --border-strong: oklch(0.86 0 0);
    --primary: oklch(0.205 0 0);
    --primary-fg: oklch(0.985 0 0);
    --sidebar-bg: oklch(0.985 0 0);
    --gutter-bg: oklch(0.99 0 0);
    --table-head: oklch(0.985 0 0);
    --accent: oklch(0.70 0.14 150); /* emerald-ish */
    --warn:   oklch(0.75 0.14 70);
    --danger: oklch(0.63 0.19 25);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.08);
    --radius: 10px;
  }
  html.dark {
    --bg: oklch(0.155 0 0);
    --fg: oklch(0.97 0 0);
    --card: oklch(0.205 0 0);
    --muted: oklch(0.245 0 0);
    --muted-fg: oklch(0.68 0 0);
    --border: oklch(0.30 0 0);
    --border-strong: oklch(0.40 0 0);
    --primary: oklch(0.92 0 0);
    --primary-fg: oklch(0.18 0 0);
    --sidebar-bg: oklch(0.175 0 0);
    --gutter-bg: oklch(0.185 0 0);
    --table-head: oklch(0.19 0 0);
    --accent: oklch(0.78 0.16 150);
    --warn:   oklch(0.82 0.15 75);
    --danger: oklch(0.72 0.18 25);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
  }
  html.dark ::selection { background: oklch(0.35 0 0); }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; font-feature-settings: "cv11","ss01","ss03"; }
  body { min-height: 100vh; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "ss02","cv01"; }
  button { font-family: inherit; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: oklch(0.88 0 0); }

  /* Page switcher */
  .page-switcher {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; gap: 2px; padding: 3px;
    background: color-mix(in oklab, var(--card) 85%, transparent);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 999px;
    box-shadow: 0 1px 2px rgba(0,0,0,.03), 0 4px 16px rgba(0,0,0,.04);
    font-size: 11px;
  }
  .page-switcher button {
    background: transparent; border: 0; padding: 5px 14px;
    border-radius: 999px; cursor: pointer; color: var(--muted-fg);
    font-weight: 500; letter-spacing: .01em;
    transition: background .15s, color .15s;
  }
  .page-switcher button.active { background: var(--primary); color: var(--primary-fg); }
  .page-switcher button:not(.active):hover { color: var(--fg); }

  /* Theme toggle (integrated into topbar) */
  .theme-toggle {
    width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; color: var(--muted-fg);
    transition: color .15s, background .15s, border-color .15s;
    padding: 0;
  }
  .theme-toggle:hover { color: var(--fg); background: var(--muted); border-color: var(--border-strong); }
  .theme-toggle svg { width: 14px; height: 14px; }
  .theme-toggle .sun { display: none; }
  .theme-toggle .moon { display: block; }
  html.dark .theme-toggle .sun { display: block; }
  html.dark .theme-toggle .moon { display: none; }

  /* Tweaks panel */
  .tweaks {
    position: fixed; right: 16px; bottom: 16px; z-index: 100;
    width: 260px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.08);
    display: none; font-size: 12px;
  }
  .tweaks.open { display: block; }
  .tweaks h4 { margin: 0 0 10px; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted-fg); font-weight: 600; }
  .tweaks label { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 0; }
  .tweaks label span { color: var(--muted-fg); }
  .tweaks .row { display: flex; gap: 4px; }
  .tweaks .row button {
    flex: 1; padding: 5px 8px; font-size: 11px; background: var(--muted);
    border: 1px solid transparent; border-radius: 6px; cursor: pointer; color: var(--muted-fg);
  }
  .tweaks .row button.on { background: var(--card); border-color: var(--border-strong); color: var(--fg); }
</style>
</head>
<body>

<div class="page-switcher" id="switcher">
  <button data-p="landing" class="active">Landing</button>
  <button data-p="analyze">/analyze</button>
</div>

<div id="root"></div>

<div class="tweaks" id="tweaks">
  <h4>Tweaks</h4>
  <label><span>Hero variant</span></label>
  <div class="row" data-tweak="hero">
    <button data-v="editorial" class="on">Editorial</button>
    <button data-v="terminal">Terminal</button>
  </div>
  <label style="margin-top:8px"><span>Sidebar</span></label>
  <div class="row" data-tweak="sidebar">
    <button data-v="shown" class="on">Shown</button>
    <button data-v="hidden">Hidden</button>
  </div>
  <label style="margin-top:8px"><span>Surface</span></label>
  <div class="row" data-tweak="surface">
    <button data-v="warm" class="on">Warm</button>
    <button data-v="cool">Cool</button>
    <button data-v="neutral">Neutral</button>
  </div>
</div>

<div id="root"></div>

<script type="text/babel" data-presets="react">

const { useState, useEffect, useMemo } = React;

/* ──────────────────────────── Icons (inline, minimal) ──────────────────────────── */
const icon = (d, stroke = 1.6) => (props) =>
<svg viewBox="0 0 24 24" width="16" height="16" fill="none"
stroke="currentColor" strokeWidth={stroke} strokeLinecap="round"
strokeLinejoin="round" aria-hidden="true" {...props}>{d}</svg>;

const IDatabase = icon(<><ellipse cx="12" cy="5" rx="8" ry="3" /><path d="M4 5v6c0 1.66 3.58 3 8 3s8-1.34 8-3V5" /><path d="M4 11v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6" /></>);
const ITerminal = icon(<><polyline points="4 17 10 11 4 5" /><line x1="12" y1="19" x2="20" y2="19" /></>);
const IGauge = icon(<><path d="M12 14l4-4" /><circle cx="12" cy="13" r="8" /><path d="M5 21h14" /></>);
const IGitCompare = icon(<><circle cx="5" cy="6" r="2" /><circle cx="19" cy="18" r="2" /><path d="M12 6h5a2 2 0 0 1 2 2v8" /><path d="M12 18H7a2 2 0 0 1-2-2V8" /><polyline points="15 9 12 6 15 3" /><polyline points="9 15 12 18 9 21" /></>);
const IHistory = icon(<><path d="M3 12a9 9 0 1 0 3-6.7" /><polyline points="3 3 3 9 9 9" /><polyline points="12 8 12 12 15 14" /></>);
const IArrowRight = icon(<><line x1="5" y1="12" x2="19" y2="12" /><polyline points="13 6 19 12 13 18" /></>);
const IPlay = icon(<><polygon points="6 4 20 12 6 20 6 4" /></>, 1.4);
const ISparkle = icon(<><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z" /></>);
const IEraser = icon(<><path d="M19 20H9l-5-5a2 2 0 0 1 0-3l8-8a2 2 0 0 1 3 0l5 5a2 2 0 0 1 0 3l-7 7" /><line x1="18" y1="13" x2="9" y2="4" /></>);
const IChevronDown = icon(<polyline points="6 9 12 15 18 9" />);
const IChevronRight = icon(<polyline points="9 6 15 12 9 18" />);
const IBook = icon(<><path d="M4 4a2 2 0 0 1 2-2h13v18H6a2 2 0 0 0-2 2V4z" /><path d="M6 16h13" /></>);
const ISearch = icon(<><circle cx="11" cy="11" r="7" /><line x1="20" y1="20" x2="16.5" y2="16.5" /></>);
const ICmd = icon(<><path d="M18 6a3 3 0 1 0-3 3h3M6 18a3 3 0 1 0 3-3v3M9 6a3 3 0 1 1 3 3V6H9m6 12a3 3 0 1 1-3-3h3v3" /></>);
const ICheck = icon(<polyline points="5 12 10 17 19 8" />, 2);

/* ──────────────────────────── Shared chrome ──────────────────────────── */
function Sidebar({ active }) {
  const nav = [
  { key: 'dash', label: 'Dashboard', icon: IDatabase, ready: false },
  { key: 'analyze', label: 'Analyzer', icon: ITerminal, ready: true },
  { key: 'bench', label: 'Benchmark', icon: IGauge, ready: false },
  { key: 'compare', label: 'Compare', icon: IGitCompare, ready: false },
  { key: 'history', label: 'History', icon: IHistory, ready: false }];

  return (
    <aside style={S.sidebar}>
      <div style={S.brand}>
        <div style={S.brandMark}><IDatabase width="14" height="14" /></div>
        <div style={{ lineHeight: 1.1 }}>
          <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-.01em' }}>QueryLab</div>
          <div style={{ fontSize: 9.5, textTransform: 'uppercase', letterSpacing: '.12em', color: 'var(--muted-fg)', marginTop: 2 }}>SQL Analyzer</div>
        </div>
      </div>

      <div style={S.navLabel}>Workspace</div>
      <nav style={{ padding: '0 8px', display: 'flex', flexDirection: 'column', gap: 1 }}>
        {nav.map((n) => {
          const Icon = n.icon;
          const isActive = active === n.key;
          return (
            <a key={n.key} style={{
              ...S.navLink,
              ...(isActive ? S.navLinkActive : null)
            }}>
              {isActive && <span style={S.navIndicator} />}
              <span style={{ display: 'flex', alignItems: 'center', gap: 10, color: "rgb(86, 86, 86)" }}>
                <Icon width="14" height="14" />
                {n.label}
              </span>
              {!n.ready && <span style={S.badgeSoon}>soon</span>}
            </a>);

        })}
      </nav>

      <div style={{ marginTop: 'auto' }}>
        <a style={{ ...S.navLink, color: 'var(--muted-fg)', margin: '0 8px 8px' }}>
          <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <IBook width="14" height="14" /> SQL Reference
          </span>
        </a>
        <div style={S.conn}>
          <div style={{ fontSize: 9.5, textTransform: 'uppercase', letterSpacing: '.14em', color: 'var(--muted-fg)', marginBottom: 6 }}>Connection</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={S.liveDot} />
            <span className="mono" style={{ fontSize: 11.5 }}>readonly_user</span>
          </div>
          <div className="mono" style={{ fontSize: 10, color: 'var(--muted-fg)', marginTop: 2 }}>postgres · queryanalyzer</div>
        </div>
      </div>
    </aside>);

}

function Topbar({ title, subtitle, right }) {
  return (
    <header style={S.topbar}>
      <div style={{ lineHeight: 1.2 }}>
        <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-.01em' }}>{title}</div>
        <div style={{ fontSize: 11.5, color: 'var(--muted-fg)', marginTop: 2 }}>{subtitle}</div>
      </div>
      <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 12 }}>
        {right}
        <div style={S.pill}><span style={S.liveDot} />API connected</div>
        <div style={{ width: 1, height: 18, background: 'var(--border)' }} />
        <span className="mono" style={{ fontSize: 11, color: 'var(--muted-fg)' }}>v0.1.0</span>
        <button className="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg className="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg className="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/></svg>
        </button>
      </div>
    </header>);

}

/* ──────────────────────────── Landing (Editorial variant) ──────────────────────────── */
function LandingEditorial() {
  return (
    <div style={{ maxWidth: 960, margin: '0 auto', padding: '48px 0 64px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, color: 'var(--muted-fg)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '.14em' }}>
        <span style={{ width: 18, height: 1, background: 'var(--border-strong)' }} />
        Postgres workbench · v0.1
      </div>

      <h1 style={{
        fontSize: 56, lineHeight: 1.02, letterSpacing: '-.035em',
        fontWeight: 500, margin: '22px 0 0', maxWidth: 780,
        textWrap: 'balance'
      }}>
        Read a query's <em style={{ fontFamily: '"JetBrains Mono"', fontStyle: 'normal', fontWeight: 400 }}>EXPLAIN</em> like prose. <span style={{ color: 'var(--muted-fg)' }}>Then fix it.</span>
      </h1>

      <p style={{ maxWidth: 560, color: 'var(--muted-fg)', fontSize: 15, lineHeight: 1.6, marginTop: 22 }}>
        QueryLab is a quiet workbench for SQL. Run a statement against your read-only role, see the plan tree, the costs, the bottlenecks — and a short list of things worth changing.
      </p>

      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 30 }}>
        <button style={S.btnPrimary}>
          Open Analyzer <IArrowRight width="14" height="14" />
        </button>
      </div>

      {/* Preview strip — a schematic, not an illustration */}
      <div style={{ marginTop: 56, border: '1px solid var(--border)', borderRadius: 'var(--radius)', background: 'var(--card)', overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 14px', borderBottom: '1px solid var(--border)', fontSize: 11, color: 'var(--muted-fg)' }}>
          <span style={{ width: 6, height: 6, borderRadius: 99, background: 'var(--border-strong)' }} />
          <span className="mono">EXPLAIN (ANALYZE, FORMAT JSON)</span>
          <span style={{ marginLeft: 'auto' }} className="mono">42.18 ms</span>
        </div>
        <div style={{ padding: 18, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
          <div>
            <div className="mono" style={{ fontSize: 12.5, lineHeight: 1.65, color: 'var(--fg)' }}>
              <span style={{ color: 'var(--muted-fg)' }}>1 </span><span style={{ color: '#4b5563' }}>SELECT</span> u.id, u.email,<br />
              <span style={{ color: 'var(--muted-fg)' }}>2 </span>  count(o.id) <span style={{ color: '#4b5563' }}>AS</span> orders<br />
              <span style={{ color: 'var(--muted-fg)' }}>3 </span><span style={{ color: '#4b5563' }}>FROM</span> users u<br />
              <span style={{ color: 'var(--muted-fg)' }}>4 </span><span style={{ color: '#4b5563' }}>LEFT JOIN</span> orders o <span style={{ color: '#4b5563' }}>ON</span> o.user_id = u.id<br />
              <span style={{ color: 'var(--muted-fg)' }}>5 </span><span style={{ color: '#4b5563' }}>WHERE</span> u.created_at &gt; now() - interval '30 days'<br />
              <span style={{ color: 'var(--muted-fg)' }}>6 </span><span style={{ color: '#4b5563' }}>GROUP BY</span> u.id;
            </div>
          </div>
          <MiniPlan />
        </div>
      </div>

      {/* Four features — plain text, no icons bloat */}
      <div style={{ marginTop: 56, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 1, border: '1px solid var(--border)', borderRadius: 'var(--radius)', overflow: 'hidden', background: 'var(--border)' }}>
        {[
        ['01', 'Analyzer', 'Run SELECT, capture EXPLAIN ANALYZE, render a plan tree.'],
        ['02', 'Benchmark', 'Loop a query N times, get min / avg / max with variance.'],
        ['03', 'Compare', 'Two editors, two plans, one diff. Pick the winner.'],
        ['04', 'History', 'Every execution, searchable, favoritable.']].
        map(([num, title, desc], i) =>
        <div key={num} style={{ background: 'var(--card)', padding: '22px 20px 24px', minHeight: 148 }}>
            <div className="mono" style={{ fontSize: 10.5, color: 'var(--muted-fg)', letterSpacing: '.1em' }}>{num}</div>
            <div style={{ fontSize: 14, fontWeight: 600, marginTop: 8, letterSpacing: '-.005em' }}>{title}</div>
            <div style={{ fontSize: 12.5, color: 'var(--muted-fg)', lineHeight: 1.5, marginTop: 6 }}>{desc}</div>
            <div style={{ marginTop: 18, display: 'flex', alignItems: 'center', gap: 6, fontSize: 11 }}>
              {i === 0 ?
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, color: 'var(--accent)' }}><span style={{ width: 5, height: 5, borderRadius: 99, background: 'var(--accent)' }} />Available</span> :
            <span style={{ color: 'var(--muted-fg)' }}>Soon</span>}
            </div>
          </div>
        )}
      </div>

      <div style={{ marginTop: 48, display: 'flex', gap: 24, fontSize: 12, color: 'var(--muted-fg)', alignItems: 'center' }}>
        <span className="mono">postgres 14 / 15 / 16</span>
        <span style={{ width: 3, height: 3, borderRadius: 99, background: 'var(--border-strong)' }} />
        <span className="mono">node · fastify · prisma</span>
        <span style={{ width: 3, height: 3, borderRadius: 99, background: 'var(--border-strong)' }} />
        <span className="mono">readonly role enforced</span>
      </div>
    </div>);

}

/* Terminal variant — a more playful, denser hero */
function LandingTerminal() {
  return (
    <div style={{ maxWidth: 960, margin: '0 auto', padding: '40px 0 64px' }}>
      <div style={{
        border: '1px solid var(--border)', borderRadius: 12,
        background: 'var(--card)', overflow: 'hidden',
        boxShadow: '0 1px 2px rgba(0,0,0,.02), 0 8px 32px rgba(0,0,0,.04)'
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 14px', borderBottom: '1px solid var(--border)' }}>
          <span style={{ width: 10, height: 10, borderRadius: 99, background: 'oklch(0.85 0.02 25)' }} />
          <span style={{ width: 10, height: 10, borderRadius: 99, background: 'oklch(0.88 0.05 85)' }} />
          <span style={{ width: 10, height: 10, borderRadius: 99, background: 'oklch(0.84 0.09 150)' }} />
          <span className="mono" style={{ fontSize: 11, color: 'var(--muted-fg)', marginLeft: 12 }}>~/querylab — psql queryanalyzer</span>
          <span className="mono" style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--muted-fg)' }}>main ●</span>
        </div>
        <div className="mono" style={{ padding: '28px 26px', fontSize: 14, lineHeight: 1.75 }}>
          <div style={{ color: 'var(--muted-fg)' }}>$ querylab --help</div>
          <div style={{ height: 8 }} />
          <div>A quiet workbench for Postgres.</div>
          <div style={{ color: 'var(--muted-fg)', marginTop: 6 }}>Analyze, benchmark, compare, and optimize SQL.</div>
          <div style={{ height: 18 }} />
          <div><span style={{ color: 'var(--muted-fg)' }}>commands:</span></div>
          <div style={{ paddingLeft: 14, display: 'grid', gridTemplateColumns: '120px 1fr', gap: '2px 12px', marginTop: 4 }}>
            <span>analyze</span>    <span style={{ color: 'var(--muted-fg)' }}>run a query, capture EXPLAIN (ANALYZE, FORMAT JSON)</span>
            <span>benchmark</span>  <span style={{ color: 'var(--muted-fg)' }}>loop N times, report min / avg / max / stddev</span>
            <span>compare</span>    <span style={{ color: 'var(--muted-fg)' }}>diff two plans side-by-side, highlight winner</span>
            <span>history</span>    <span style={{ color: 'var(--muted-fg)' }}>recent executions, favorites, slowest queries</span>
          </div>
          <div style={{ height: 18 }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ color: 'var(--muted-fg)' }}>$</span>
            <span style={{ borderBottom: '1px solid var(--fg)', paddingBottom: 2 }}>querylab analyze</span>
            <span style={{ width: 8, height: 16, background: 'var(--fg)', animation: 'blink 1s steps(2) infinite', display: 'inline-block' }} />
          </div>
        </div>
        <div style={{ borderTop: '1px solid var(--border)', padding: '12px 20px', display: 'flex', alignItems: 'center', gap: 10 }}>
          <button style={S.btnPrimary}>Open Analyzer <IArrowRight width="14" height="14" /></button>
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 14, fontSize: 11.5, color: 'var(--muted-fg)' }}>
            <span className="mono">⌘K search</span>
            <span className="mono">⌘↵ run</span>
            <span className="mono">⌘⇧↵ analyze</span>
          </div>
        </div>
      </div>

      <div style={{ marginTop: 40, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
        {[
        ['Safe by construction', 'Every query runs as a readonly_user role with a 10s statement_timeout. Nothing destructive reaches your data.'],
        ['Built for reading plans', 'Recursive plan tree, cost severity, missing-index hints, bottleneck detection — opinionated but not loud.'],
        ['Honest numbers', 'Raw timings. Iteration variance. No "performance score" theater.']].
        map(([h, p]) =>
        <div key={h}>
            <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-.005em' }}>{h}</div>

function PlanTree() {
  const n = (data) => ({ ...data });
  const tree = n({
    type: 'HashAggregate', cost: 218.40, rows: 2418, actual: 2418, time: 42.18, tag: 'ok',
    children: [
    n({
      type: 'Hash Right Join', cost: 184.12, rows: 2418, actual: 2418, time: 38.01, tag: 'ok',
      hashCond: '(o.user_id = u.id)',
      children: [
      n({
        type: 'Seq Scan', relation: 'orders', cost: 142.00, rows: 8421, actual: 8421, time: 22.70, tag: 'warning',
        filter: 'created_at IS NOT NULL'
      }),
      n({
        type: 'Index Scan', relation: 'users', index: 'users_created_at_idx',
        cost: 18.20, rows: 2418, actual: 2418, time: 6.12, tag: 'indexed',

function PlanNode({ node, depth = 0 }) {

    ok: { accent: 'var(--border-strong)', dot: 'var(--muted-fg)', label: 'ok', bg: 'var(--muted)', fg: 'var(--muted-fg)' },

    indexed: { accent: 'var(--accent)', dot: 'var(--accent)', label: 'indexed', bg: 'oklch(0.96 0.03 150)', fg: 'var(--accent)' },
    danger: { accent: 'var(--danger)', dot: 'var(--danger)', label: 'high cost', bg: 'oklch(0.96 0.04 25)', fg: 'var(--danger)' }
  }[node.tag] || {};

  return (
    <div style={{ position: 'relative', paddingLeft: depth === 0 ? 0 : 20, marginLeft: depth === 0 ? 0 : 10 }}>
      {depth > 0 && <span style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 1, background: 'var(--border)' }} />}
      <div style={{
        position: 'relative', borderRadius: 10, border: '1px solid var(--border)',
        background: 'var(--card)', padding: '12px 14px', marginTop: 8, marginBottom: 8
      }}>
        <span style={{ position: 'absolute', left: 0, top: 12, bottom: 12, width: 3, borderRadius: '0 3px 3px 0', background: tags.accent }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, paddingLeft: 8 }}>
          {children.length > 0 ?
          <button onClick={() => setOpen((o) => !o)} style={{ background: 'none', border: 0, color: 'var(--muted-fg)', cursor: 'pointer', padding: 0, display: 'flex' }}>
              {open ? <IChevronDown width="13" height="13" /> : <IChevronRight width="13" height="13" />}
            </button> :
          <span style={{ width: 13, height: 13, display: 'inline-block' }} />}
          <span style={{ width: 6, height: 6, borderRadius: 99, background: tags.dot }} />
          <span style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-.005em' }}>{node.type}</span>
          {node.relation && <span className="mono" style={{ fontSize: 11, color: 'var(--muted-fg)' }}>on <span style={{ color: 'var(--fg)' }}>{node.relation}</span></span>}
          {node.index && <span className="mono" style={{ fontSize: 11, color: 'var(--muted-fg)' }}>using <span style={{ color: 'var(--fg)' }}>{node.index}</span></span>}
          <span style={{
            marginLeft: 'auto', fontSize: 10, padding: '2px 8px', borderRadius: 999,
            background: tags.bg, color: tags.fg, fontWeight: 500
          }}>{tags.label}</span>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, paddingLeft: 30, marginTop: 10 }}>
          <Stat label="Cost" value={node.cost.toFixed(2)} />
          <Stat label="Est. Rows" value={node.rows.toLocaleString()} />
          <Stat label="Actual Rows" value={node.actual.toLocaleString()} />
          <Stat label="Time (ms)" value={node.time.toFixed(2)} />
        </div>
        {(node.indexCond || node.filter || node.hashCond) &&
        <div style={{ paddingLeft: 30, marginTop: 10, display: 'flex', flexDirection: 'column', gap: 4 }}>
            {node.indexCond && <CondLine label="index" v={node.indexCond} />}
            {node.hashCond && <CondLine label="hash" v={node.hashCond} />}

          </div>
        }
      </div>
      {open && children.map((c, i) => <PlanNode key={i} node={c} depth={depth + 1} />)}
    </div>);

}

/* ──────────────────────────── App + shell ──────────────────────────── */
function App() {
  const [page, setPage] = useState(() => localStorage.getItem('ql_page') || 'landing');
  const [tweaks, setTweaks] = useState({ hero: 'editorial', sidebar: 'shown', surface: 'warm' });

  useEffect(() => {localStorage.setItem('ql_page', page);}, [page]);

  const [, forceTick] = useState(0);
  // theme
  useEffect(() => {
    const saved = localStorage.getItem('ql_theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = saved || (prefersDark ? 'dark' : 'light');
    document.documentElement.classList.toggle('dark', theme === 'dark');
    const onClick = (e) => {
      if (!e.target.closest('#themeToggle')) return;
      const next = document.documentElement.classList.toggle('dark') ? 'dark' : 'light';
      localStorage.setItem('ql_theme', next);
      forceTick((t) => t + 1);
    };
    document.addEventListener('click', onClick);
    return () => document.removeEventListener('click', onClick);
  }, []);

  // hook up switcher
  useEffect(() => {
    const sw = document.getElementById('switcher');
    sw.addEventListener('click', (e) => {
      const b = e.target.closest('button[data-p]');
      if (!b) return;
      setPage(b.dataset.p);
      sw.querySelectorAll('button').forEach((x) => x.classList.toggle('active', x === b));
    });

    const tw = document.getElementById('tweaks');
    tw.addEventListener('click', (e) => {
      const b = e.target.closest('button[data-v]');
      if (!b) return;
      const key = b.parentElement.dataset.tweak;
      b.parentElement.querySelectorAll('button').forEach((x) => x.classList.toggle('on', x === b));
      setTweaks((t) => ({ ...t, [key]: b.dataset.v }));
    });

    // Edit-mode integration
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') tw.classList.add('open');
      if (e.data?.type === '__deactivate_edit_mode') tw.classList.remove('open');
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  // surface tone tweak — only applies in light mode
  useEffect(() => {
    const root = document.documentElement;
    const isDark = root.classList.contains('dark');
    if (isDark) {root.style.removeProperty('--bg');root.style.removeProperty('--muted');return;}
    if (tweaks.surface === 'warm') {root.style.setProperty('--bg', 'oklch(0.992 0.004 85)');root.style.setProperty('--muted', 'oklch(0.968 0.004 85)');}
    if (tweaks.surface === 'cool') {root.style.setProperty('--bg', 'oklch(0.992 0.004 240)');root.style.setProperty('--muted', 'oklch(0.968 0.004 240)');}
    if (tweaks.surface === 'neutral') {root.style.setProperty('--bg', 'oklch(0.992 0 0)');root.style.setProperty('--muted', 'oklch(0.968 0 0)');}
  }, [tweaks.surface]);

  const showSidebar = tweaks.sidebar === 'shown';
  const isAnalyze = page === 'analyze';

  return (
    <div style={{ minHeight: '100vh', display: 'flex' }}>
      {showSidebar && <Sidebar active={isAnalyze ? 'analyze' : 'dash'} />}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, background: 'var(--bg)' }}>
        <Topbar
          title={isAnalyze ? 'Analyzer' : 'Dashboard'}
          subtitle={isAnalyze ? 'Run SQL, inspect execution plans, and capture metrics.' : 'Overview — analyze, benchmark, and optimize your SQL.'}
          right={!isAnalyze ? <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 10px 4px 10px', border: '1px solid var(--border)', borderRadius: 8, background: 'var(--card)', fontSize: 12 }}>
            <ISearch width="13" height="13" color="var(--muted-fg)" />
            <span style={{ color: 'var(--muted-fg)' }}>Search tables, queries…</span>
            <kbd style={{ ...S.kbd, marginLeft: 18 }}>⌘K</kbd>
          </div> : null} />
        
        <main style={{ flex: 1, padding: '24px 40px 40px', overflow: 'auto' }}>
          {isAnalyze ?
          <AnalyzePage /> :
          tweaks.hero === 'terminal' ? <LandingTerminal /> : <LandingEditorial />}
        </main>
      </div>
    </div>);

}
